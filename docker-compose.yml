services:
  db:
    image: postgres:16
    container_name: sociallens-bi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sociallens_bi}
      POSTGRES_USER: ${POSTGRES_USER:-sociallens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sociallens_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sociallens} -d ${POSTGRES_DB:-sociallens_bi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
